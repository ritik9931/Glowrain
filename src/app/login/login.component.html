<!-- Toast -->
<div class="lg-toast"
     [class.show]="toast.show"
     [class.toast-success]="toast.type==='success'"
     [class.toast-error]="toast.type==='error'">
  {{ toast.message }}
</div>

<div class="lg-page">
  <div class="lg-card">

    <!-- Brand -->
    <div class="lg-brand">
      <span class="lg-logo">🛍️</span>
      <h1 class="lg-title">Ritik Store</h1>
      <p class="lg-subtitle">Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="lg-field">
        <label>Email Address</label>
        <input type="email"
               formControlName="email"
               placeholder="you@example.com"
               [class.invalid]="submitted && f['email'].errors">
        <small *ngIf="submitted && f['email'].errors?.['required']">Email is required</small>
        <small *ngIf="submitted && f['email'].errors?.['email']">Enter a valid email</small>
      </div>

      <!-- Password -->
      <div class="lg-field">
        <div class="lg-label-row">
          <label>Password</label>
        </div>
        <div class="lg-password-wrap" [class.invalid]="submitted && f['password'].errors">
          <input [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password"
                 placeholder="Min 6 characters">
          <button type="button" class="lg-eye" (click)="togglePasswordVisibility()">
            <i class="bi" [class.bi-eye]="hidePassword" [class.bi-eye-slash]="!hidePassword"></i>
          </button>
        </div>
        <small *ngIf="submitted && f['password'].errors?.['required']">Password is required</small>
        <small *ngIf="submitted && f['password'].errors?.['minlength']">Minimum 6 characters</small>
      </div>

      <!-- Remember me -->
      <label class="lg-remember">
        <input type="checkbox" formControlName="rememberMe">
        <span class="lg-check-track"><span class="lg-check-thumb"></span></span>
        Remember me
      </label>

      <!-- Submit -->
      <button type="submit" class="lg-btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="lg-spinner"></span>
      </button>

    </form>

    <!-- Register link -->
    <p class="lg-register-link">
      Don't have an account?
      <a routerLink="/register">Create one →</a>
    </p>

  </div>
</div>
