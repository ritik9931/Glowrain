<div class="container-fluid p-2 p-md-4">

  <!-- Stats Cards -->
  <div class="row g-2 mb-4">
    <div class="col-12 col-sm-6 col-md-3" *ngFor="let stat of stats">
      <div class="card text-white {{ stat.bg }} shadow-sm h-100 hover-scale">
        <div class="card-body d-flex flex-column flex-sm-row flex-wrap align-items-center justify-content-center gap-2">
          <!-- Icon -->
          <i class="bi {{ stat.icon }} stat-icon"></i>
          <!-- Text -->
          <div class="text-center text-sm-start">
            <h6 class="mb-1 stat-title">{{ stat.title }}</h6>
            <h5 class="mb-0 stat-value">{{ stat.value }}</h5>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts & Latest Orders -->
  <div class="row g-3">

    <!-- Sales Chart -->
    <div class="col-12 col-lg-6">
      <div class="card shadow-sm h-100 hover-scale">
        <div class="card-header">
          <h6 class="mb-0">Sales Trend</h6>
        </div>
        <div class="card-body chart-container">
          <canvas baseChart
                  [data]="salesData"
                  [options]="salesOptions"
                  chartType="line"
                  class="w-100 h-100">
          </canvas>
        </div>
      </div>
    </div>

    <!-- Latest Orders Table -->
    <div class="col-12 col-lg-6">
      <div class="card shadow-sm h-100 hover-scale">
        <div class="card-header">
          <h6 class="mb-0">Latest Orders</h6>
        </div>
        <div class="card-body p-1 table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th class="text-nowrap">Order ID</th>
                <th>Customer</th>
                <th>Status</th>
                <th>Amount</th>
                <th class="text-nowrap">Date</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let order of latestOrders" class="table-row-hover">
                <td class="text-nowrap">#{{ order.id }}</td>
                <td>{{ order.customer }}</td>
                <td>
                  <span class="badge"
                        [ngClass]="{
                          'bg-warning': order.status === 'Pending',
                          'bg-success': order.status === 'Delivered',
                          'bg-info': order.status === 'Shipped',
                          'bg-danger': order.status === 'Cancelled'
                        }">
                    {{ order.status }}
                  </span>
                </td>
                <td>{{ order.amount }}</td>
                <td class="text-nowrap">{{ order.date }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>
