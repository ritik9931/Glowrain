<div class="layout-container d-flex flex-column min-vh-100">
  <!-- ✅ Fixed Header -->
<header class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
  <div class="container-fluid px-3 d-flex align-items-center justify-content-between">
    
    <!-- Sidebar Toggle (mobile) -->
    <button
      class="btn btn-outline-secondary d-lg-none me-2"
      (click)="toggleSidebar()"
    >
      <i class="bi" [ngClass]="isSidebarOpen ? 'bi-x-lg' : 'bi-list'"></i>
    </button>

    <!-- Logo -->
    <a class="navbar-brand fw-bold mb-0">🛍️ Ritik Store</a>

    <!-- Desktop Search Bar -->
    <div class="d-none d-lg-flex flex-grow-1 justify-content-center align-items-center">
      <input
        type="text"
        class="form-control w-50 me-2"
        placeholder="Search products..."
      />
      <button class="btn btn-primary">Search</button>
    </div>

    <!-- Right Icons (always in one line) -->
    <div class="d-flex align-items-center">
      <!-- Mobile Search Icon -->
      <button
        class="btn btn-outline-primary d-lg-none me-2"
        (click)="toggleSearch()"
      >
        <i class="bi" [ngClass]="isSearchOpen ? 'bi-x-lg' : 'bi-search'"></i>
      </button>

      <!-- Cart -->
      <!-- <a routerLink="/cart" class="btn btn-outline-dark me-2"> -->
        <a class="btn btn-outline-dark me-2">
        <i class="bi bi-cart"></i>
      </a>

      <!-- Login / Logout -->
      <ng-container *ngIf="!isLoggedIn; else logoutBtn">
        <a routerLink="/login" class="btn btn-outline-primary">Login</a>
      </ng-container>
      <ng-template #logoutBtn>
        <button class="btn btn-outline-danger" (click)="logout()">Logout</button>
      </ng-template>
    </div>
  </div>

  <!-- Collapsible Mobile Search -->
  <div
    *ngIf="isSearchOpen"
    class="mobile-search bg-light py-2 px-3 border-top"
  >
    <div class="d-flex">
      <input
        type="text"
        class="form-control me-2"
        placeholder="Search products..."
      />
      <button class="btn btn-primary">Search</button>
    </div>
  </div>
</header>


  <!-- ✅ Overlay -->
  <div class="overlay" *ngIf="isSidebarOpen" (click)="closeSidebar()"></div>

  <!-- ✅ Body -->
  <div class="d-flex flex-grow-1 position-relative content-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar bg-white shadow-sm p-3" [class.open]="isSidebarOpen">
      <h5 class="fw-bold mb-3">Categories</h5>
      <ul class="list-group">
        <li class="list-group-item">
          <a routerLink="/dashboard" (click)="closeSidebar()"
            >Dashboard</a
          >
        </li>
        <li class="list-group-item">
          <a routerLink="pages/home" (click)="closeSidebar()">Home</a>
        </li>
        
        <li class="list-group-item">
          <a (click)="closeSidebar()"
            >Fashion</a
          >
        </li>
        <li class="list-group-item">
          <a (click)="closeSidebar()"
            >Home & Living</a
          >
        </li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow-1 p-3 main-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- ✅ Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">&copy; {{ currentYear }} Ritik Store. All rights reserved.</p>
  </footer>
</div>
